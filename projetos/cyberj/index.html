<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Jokenpô</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;700&display=swap');

    @font-face {
      font-family: 'CyberPunk';
      src: url('fonts/CyberPunk.otf') format('opentype');
    }

    * {
      margin: 0;
      box-sizing: border-box;
      font-family: "JetBrains Mono", monospace;
    }

    :root {
      --bg-main: #0f0f1a;
      --neon-cyan: #00ffff;
      --neon-purple: #c300ff;
      --neon-pink: #ff007f;
      --neon-green: #39ff14;
      --text-light: #e0e0e0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-light);
      text-align: center;
      transition: 0.4s;
    }

    /* 👇 EFEITO GLOBAL (vitória/derrota) */
    body.verde {
      background: radial-gradient(circle, #39ff14 0%, #0f0f1a 70%);
    }

    body.vermelho {
      background: radial-gradient(circle, #ff007f 0%, #0f0f1a 70%);
    }

    header {
      background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
    }

    header h1 {
      font-family: "CyberPunk";
      font-size: 4rem;
      padding: 25px;
      text-shadow: 0 0 10px var(--neon-purple);
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      pointer-events: none;
    }

    #botaoMusica {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: 1px solid var(--neon-cyan);
      background: rgba(0, 255, 255, 0.05);
      color: var(--neon-cyan);
      font-size: 1.3em;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    #botaoMusica:hover {
      background: var(--neon-cyan);
      color: black;
      box-shadow: 0 0 15px var(--neon-cyan);
    }

    #placar {
      margin: 40px auto 0;
      padding: 15px;
      max-width: 800px;
      border: 1px solid var(--neon-cyan);
      border-radius: 10px 10px 0 0;
    }

    #mensagens {
      max-width: 800px;
      margin: 0 auto 20px;
      padding: 15px;
      background-color: #1f1f2e;
      border: 1px solid var(--neon-cyan);
      border-top: none;
      border-radius: 0 0 10px 10px;
      min-height: 100px;
    }

    .versus {
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 20px;
    }

    .lado-jogador,
    .lado-robo {
      flex: 1;
    }

    .lado-jogador strong,
    .lado-robo strong {
      font-size: 1.5rem;
    }

    .vs {
      color: var(--neon-cyan);
      font-weight: bold;
    }

    /* destaque da caixa */
    #mensagens.verde {
      background: var(--neon-green);
      color: black;
    }

    #mensagens.vermelho {
      background: var(--neon-pink);
      color: black;
    }

    #arena {
      display: flex;
      justify-content: space-around;
      margin: 20px auto;
      max-width: 900px;
    }

    .lado {
      flex: 1;
      padding: 20px;
      margin: 10px;
      background-color: #1f1f2e;
      border: 1px solid var(--neon-purple);
      border-radius: 10px;
    }

    #div1 {
      background: url("img/Curious-bro.png") center/cover;
    }

    #div3 {
      background: url("img/Robot-face.png") center/cover;
    }

    #div2 {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: var(--neon-cyan);
      color: black;
      box-shadow: 0 0 10px var(--neon-cyan);
    }

    #btnReiniciar {
      display: none;
      background: var(--neon-green);
      color: black;
      border: none;
    }

    footer {
      padding: 20px;
      background-color: #111;
    }
  </style>
</head>

<body>

  <header>
    <h1>Cyber Jokenpô</h1>
    <button id="botaoMusica" onclick="tocarMusica()">🎵</button>

    <audio id="musicaFundo" loop>
      <source src="mp3/game-music.mp3" type="audio/mpeg">
    </audio>
  </header>

  <canvas id="neve"></canvas>

  <h2 id="placar">Menino [0] x [0] Robô</h2>

  <div id="mensagens">
    <p>Escolha com sabedoria, meu jovem...</p>
  </div>

  <div id="arena">
    <div class="lado" id="div1"></div>

    <div class="lado" id="div2">
      <div id="botoes">
        <button onclick="tocarClique(); jogar(1)">🪨 Pedra</button>
        <button onclick="tocarClique(); jogar(2)">📄 Papel</button>
        <button onclick="tocarClique(); jogar(3)">✂️ Tesoura</button>
      </div>

      <button id="btnReiniciar" onclick="tocarClique(); reiniciarJogo()">
        🔄 Iniciar
      </button>
    </div>

    <div class="lado" id="div3"></div>
  </div>

  <audio id="somClique" src="mp3/click.mp3"></audio>

  <footer>
    <p>&copy; fernandoaguiardev</p>
  </footer>

  <script>

    const canvas = document.getElementById('neve');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();

    let flocos = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 1,
      vy: Math.random() * 0.5 + 0.3
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";

      flocos.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fill();

        f.y += f.vy;
        if (f.y > canvas.height) {
          f.y = 0;
          f.x = Math.random() * canvas.width;
        }
      });

      requestAnimationFrame(draw);
    }

    draw();

    window.addEventListener('resize', resize);
    
    
    
    let scoreUser = 0;
    let scorePC = 0;
    let jogoEncerrado = false;

    function jogadaPC() {
      return Math.floor(Math.random() * 3) + 1;
    }

    function resultadoRodada(jogadaUser, jogadaPC) {
      let resultado = "";

      if (jogadaUser == jogadaPC) {
        resultado = "Empate!";
      } else if (
        (jogadaUser == 1 && jogadaPC == 3) ||
        (jogadaUser == 2 && jogadaPC == 1) ||
        (jogadaUser == 3 && jogadaPC == 2)
      ) {
        scoreUser++;
        resultado = "Você ganhou!";
      } else {
        scorePC++;
        resultado = "Robô venceu!";
      }

      document.getElementById("placar").innerText =
        `Menino [${scoreUser}] x [${scorePC}] Robô`;

      return resultado;
    }

    function jogar(escolha) {
      if (jogoEncerrado) return;

      const maoPC = jogadaPC();
      const jogadas = ["", "🪨 Pedra", "📄 Papel", "✂️ Tesoura"];

      const mensagens = document.getElementById("mensagens");
      mensagens.classList.remove("verde", "vermelho");
      document.body.classList.remove("verde", "vermelho");

      let texto = `
        <div class="versus">
          <div>
            <p>Você</p>
            <strong>${jogadas[escolha]}</strong>
          </div>

          <div class="vs">VS</div>

          <div>
            <p>Robô</p>
            <strong>${jogadas[maoPC]}</strong>
          </div>
        </div>
      `;

      const resultado = resultadoRodada(escolha, maoPC);
      texto += `<p><strong>${resultado}</strong></p>`;

      if (scoreUser + scorePC === 3) {
        document.getElementById("botoes").style.display = "none";
        document.getElementById("btnReiniciar").style.display = "block";

        if (scoreUser > scorePC) {
          texto += `<p>🔥 VOCÊ GANHOU!</p>`;
          mensagens.classList.add("verde");
          document.body.classList.add("verde");
        } else if (scoreUser < scorePC) {
          texto += `<p>💀 ROBÔ VENCEU!</p>`;
          mensagens.classList.add("vermelho");
          document.body.classList.add("vermelho");
        } else {
          texto += `<p>EMPATE!</p>`;
        }

        jogoEncerrado = true;
      }

      mensagens.innerHTML = texto;
    }

    function reiniciarJogo() {
      scoreUser = 0;
      scorePC = 0;
      jogoEncerrado = false;

      document.getElementById("placar").innerText =
        "Menino [0] x [0] Robô";

      const mensagens = document.getElementById("mensagens");
      mensagens.classList.remove("verde", "vermelho");
      document.body.classList.remove("verde", "vermelho");

      mensagens.innerHTML = "<p>Escolha com sabedoria...</p>";

      document.getElementById("botoes").style.display = "block";
      document.getElementById("btnReiniciar").style.display = "none";
    }

    function tocarClique() {
      const audio = document.getElementById("somClique");
      audio.currentTime = 0;
      audio.play();
    }

    let tocando = false;

    function tocarMusica() {
      const audio = document.getElementById("musicaFundo");
      const botao = document.getElementById("botaoMusica");

      if (!tocando) {
        audio.play();
        botao.innerText = "🔊";
      } else {
        audio.pause();
        botao.innerText = "🎵";
      }

      tocando = !tocando;
    }
  </script>

</body>

</html>
