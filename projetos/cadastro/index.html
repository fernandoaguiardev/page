<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="icon/home.png">
    <title>Cadastro de Imóveis</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- BANNER -->
    <header class="banner">
        <div class="banner-overlay">
            <div class="banner-content">
                <h1 class="banner-title">Imobiliária Bom Despejo</h1>
                <p class="banner-subtitle">Encontre o imóvel ideal para você</p>
            </div>
        </div>
    </header>

    <!-- FORMULÁRIO -->
    <div class="container d-flex justify-content-center align-items-center py-5">

        <div class="card shadow p-4 form-container">

            <h3 class="text-center mb-4">Cadastro de Imóveis</h3>

            <form id="formImovel">

                <div class="mb-3">
                    <input type="text" id="proprietario" class="form-control" placeholder="Proprietário" required>
                </div>

                <div class="mb-3">
                    <input type="number" id="quartos" class="form-control" placeholder="Quartos" required>
                </div>

                <div class="mb-3">
                    <input type="number" id="banheiros" class="form-control" placeholder="Banheiros" required>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" id="garagem" class="form-check-input">
                    <label class="form-check-label">Possui garagem</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Cadastrar
                </button>

            </form>

            <hr>

            <div class="d-grid gap-2">
                <button onclick="mostrarImoveis()" class="btn btn-outline-secondary">
                    Mostrar Imóveis
                </button>

                <button onclick="deletarImovel()" class="btn btn-outline-danger">
                    Deletar por ID
                </button>
            </div>

        </div>

    </div>

    <!-- LISTA DE IMÓVEIS -->
    <div class="container mt-4">
        <div id="lista" class="row g-3"></div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
